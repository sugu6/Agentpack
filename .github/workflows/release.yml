name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: '要发布的版本号 (例如 0.1.3)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Prepare Release v${{ inputs.version }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate version
        shell: bash
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          # 使用 env 传参避免 shell 注入；[[ =~ ]] 对整个字符串匹配（非逐行）
          if ! [[ "$INPUT_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Invalid version format: $INPUT_VERSION (expected X.Y.Z)"
            exit 1
          fi
          if git tag -l "v$INPUT_VERSION" | grep -q .; then
            echo "::error::Tag v$INPUT_VERSION already exists. Delete it first if you want to re-release."
            exit 1
          fi
          echo "VERSION=$INPUT_VERSION" >> $GITHUB_ENV

      - name: Update version numbers and changelog
        run: node scripts/release.mjs "$VERSION"

      - name: Show changes
        run: |
          git diff
          echo "---"
          echo "wails.json version:"
          grep -o '"productVersion"[[:space:]]*:[[:space:]]*"[^"]*"' wails.json
          echo "frontend/package.json version:"
          grep -o '"version"[[:space:]]*:[[:space:]]*"[^"]*"' frontend/package.json | head -1

      - name: Commit and tag
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add wails.json frontend/package.json CHANGELOG.md CHANGELOG_EN.md
          git commit -m "chore: release v${VERSION}"
          git tag -a "v${VERSION}" -m "Release v${VERSION}"
          git push origin "HEAD:${{ github.event.repository.default_branch }}"
          git push origin "v${VERSION}"

      - name: Summary
        shell: bash
        run: |
          echo "### Release v${VERSION} prepared" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Updated wails.json and frontend/package.json to ${VERSION}" >> $GITHUB_STEP_SUMMARY
          echo "- Converted CHANGELOG [Unreleased] to [${VERSION}]" >> $GITHUB_STEP_SUMMARY
          echo "- Created tag v${VERSION}" >> $GITHUB_STEP_SUMMARY
          echo "- Pushed to ${{ github.event.repository.default_branch }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Build workflow will be triggered automatically by the tag push." >> $GITHUB_STEP_SUMMARY
