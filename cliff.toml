# git-cliff 配置文件
# 文档: https://git-cliff.org/docs/configuration
# 本配置适配项目的 Conventional Commits 风格，输出中文章节标题

[changelog]
header = """
# 更新日志\n
本项目遵循 [Keep a Changelog](https://keepachangelog.com/zh-CN/1.1.0/) 格式，
版本号遵循 [语义化版本](https://semver.org/lang/zh-CN/)。\n
"""
body = """
{% if version %}\
    ## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
    ## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | upper_first }}
{% for commit in commits %}
- {% if commit.scope %}**{{ commit.scope }}**: {% endif %}\
    {{ commit.message | upper_first }}
{% endfor %}
{% endfor %}\n
"""
trim = true
footer = """
<!-- generated by git-cliff -->
"""

[git]
conventional_commits = true
filter_unconventional = false
split_commits = false

# 提交类型到分组标题的映射（中文）
commit_preprocessors = [
    { pattern = '\((.*)\)', replace = "" },
]

commit_parsers = [
    { message = "^feat", group = "新增" },
    { message = "^fix", group = "修复" },
    { message = "^refactor", group = "重构" },
    { message = "^perf", group = "性能优化" },
    { message = "^doc", group = "文档" },
    { message = "^test", group = "测试" },
    { message = "^chore", group = "杂项" },
    { message = "^ci", group = "持续集成" },
    { message = "^style", group = "代码风格" },
    { message = "^revert", group = "回退" },
    { body = ".*security", group = "安全" },
]
filter_commits = false
tag_pattern = "v[0-9].*"
sort_commits = "oldest"
